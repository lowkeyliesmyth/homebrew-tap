name: brew test-bot

on:
  workflow_call:
  pull_request:
    paths:
      - "Formula/**"
      - ".github/workflows/ci.yml"
  push:
    branches:
      - main
    paths:
      - "Formula/**"

# Reason: cancel superseded runs on the same ref. Formula audits and test
# installs are slow; we do not want three runs of the same PR stacking up.
concurrency:
  group: brew-test-bot-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: read

jobs:
  test-bot:
    strategy:
      fail-fast: false
      matrix:
        # Reason: validate the formula on every platform we actually ship a
        # binary for. macos-15 (Sequoia) and macos-26 (Tahoe) are both
        # Apple Silicon — we do not ship a darwin-x86_64 binary, and the
        # formula declares `depends_on arch: :arm64` inside `on_macos` to
        # make that explicit. ubuntu-24.04 covers Linux x86_64. We skip
        # Linux arm64 because brew on Linux arm64 is unofficial and the
        # static binary itself is already validated by the upstream
        # release workflow.
        os:
          - macos-15
          - macos-26
          - ubuntu-24.04
    runs-on: ${{ matrix.os }}
    steps:
      - name: Set up Homebrew
        id: set-up-homebrew
        # Reason: setup-homebrew automatically taps the current repo when
        # the repo name starts with `homebrew-`, so subsequent `brew` calls
        # can refer to `lowkeyliesmyth/tap` without an explicit tap step.
        uses: Homebrew/actions/setup-homebrew@59e6b20d96df1a3c9ccb0aa402676e01a4cc6ff3 # master @ 2026-04

      - name: Cache Homebrew Bundler RubyGems
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ${{ steps.set-up-homebrew.outputs.gems-path }}
          key: ${{ matrix.os }}-rubygems-${{ steps.set-up-homebrew.outputs.gems-hash }}
          restore-keys: ${{ matrix.os }}-rubygems-

      - name: Style check
        # Reason: `brew style` runs RuboCop against every formula in the
        # tap and catches formatting and idiomatic-Ruby issues. We do not
        # run `brew test-bot --only-tap-syntax` because that invokes
        # `readall --os=all --arch=all`, which iterates Intel macOS — a
        # platform we explicitly do not ship for. See depends_on arch:
        # :arm64 in Formula/crux.rb.
        run: brew style lowkeyliesmyth/tap

      - name: Audit formula
        # Reason: `brew audit --strict` verifies the formula against the
        # current runner's platform: malformed URLs, deprecated stanzas,
        # missing licenses, dead links, etc. Scoped per-platform so it
        # does not trip on the absent Intel macOS variant.
        run: brew audit --strict lowkeyliesmyth/tap/crux

      - name: Run brew test-bot --only-cleanup-before
        # Reason: cleanup + setup are prerequisites for the install+test
        # pass below. Skipped on plain pushes since we only do the full
        # install dance on PRs.
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-cleanup-before

      - name: Run brew test-bot --only-setup
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-setup

      - name: Run brew test-bot (formula install + test)
        # Reason: the full install-and-test pass is the slowest part of
        # test-bot, so we only do it for PRs. Pushes to main that come from
        # the crux release bump job have already been audited upstream.
        if: github.event_name == 'pull_request'
        run: brew test-bot --only-formulae
